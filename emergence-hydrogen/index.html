<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Models of the Hydrogen Atom — Emergence prototype</title>
  <link rel="stylesheet" href="style.css" />
  <!-- p5.js + ml5.js (handPose wraps MediaPipe Hands) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="toolbar"></div>
    <div id="stage"></div>
    <div id="bottombar">
      <label for="wavelength">Wavelength</label>
      <input type="range" id="wavelength" />
      <span id="wl-readout">—</span>
      <span class="hint">tip: pinch-drag (or click-drag) over the canvas to tune energy; quick pinch/click to fire</span>
    </div>
  </div>

  <!-- simulation modules (load order matters) -->
  <script src="js/physics.js"></script>
  <script src="js/spectrum.js"></script>
  <script src="js/photon.js"></script>
  <script src="js/gun.js"></script>
  <script src="js/energyDiagram.js"></script>
  <script src="js/spectrometer.js"></script>
  <script src="js/models/models.js"></script>
  <script src="js/hands.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sketch.js"></script>
</body>
</html>
